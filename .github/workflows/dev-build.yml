name: Dev Build - Testing

on:
  workflow_dispatch:
  
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
      - run: GOOS=windows GOARCH=amd64 go build -ldflags="-X github.com/neozmmv/blindspot/cmd.Version=dev-${{ github.sha }}" -o bsdev.exe .
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blindspot-dev-${{ github.sha }}
          path: bsdev.exe