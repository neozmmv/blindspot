name: blindspot release

on: 
  push:
    tags:
      - 'v*.*.*'

permissions:
    contents: write

jobs:
    build:
        name: Build and Upload
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v4
              with:
                go-version: '1.25.6'

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                bun-version: latest

            # The tray binary embeds internal/gui/frontend/dist (//go:embed), which is
            # gitignored, so the frontend must be compiled before `go build ./cmd/tray`.
            - name: Build tray frontend
              working-directory: internal/gui/frontend
              run: |
                bun install
                bun run build

            - name: Build
              run: |
                GOOS=linux GOARCH=amd64 go build -ldflags "-X github.com/neozmmv/blindspot/cmd.Version=${{ github.ref_name }}" -o blindspot-linux-amd64 .
                GOOS=linux GOARCH=arm64 go build -ldflags "-X github.com/neozmmv/blindspot/cmd.Version=${{ github.ref_name }}" -o blindspot-linux-arm64 .
                GOOS=windows GOARCH=amd64 go build -ldflags "-X github.com/neozmmv/blindspot/cmd.Version=${{ github.ref_name }}" -o blindspot.exe .
                GOOS=windows GOARCH=amd64 go build -ldflags "-H windowsgui -X github.com/neozmmv/blindspot/cmd.Version=${{ github.ref_name }}" -o blindspot-tray.exe ./cmd/tray
                GOOS=darwin GOARCH=amd64 go build -ldflags "-X github.com/neozmmv/blindspot/cmd.Version=${{ github.ref_name }}" -o blindspot-darwin-amd64 .
                GOOS=darwin GOARCH=arm64 go build -ldflags "-X github.com/neozmmv/blindspot/cmd.Version=${{ github.ref_name }}" -o blindspot-darwin-arm64 .

            - name: Upload Artifacts
              uses: actions/upload-artifact@v4
              with:
                name: binaries
                path: |
                  blindspot-linux-amd64
                  blindspot-linux-arm64
                  blindspot.exe
                  blindspot-tray.exe
                  blindspot-darwin-amd64
                  blindspot-darwin-arm64

    release:
        name: Release
        needs: build
        runs-on: ubuntu-latest
        steps:
          - name: Download Artifacts
            uses: actions/download-artifact@v4
            with:
              name: binaries

          - name: Create Release
            uses: softprops/action-gh-release@v2
            with:
              name: "blindspot ${{ github.ref_name }}"
              files: |
                blindspot-linux-amd64
                blindspot-linux-arm64
                blindspot.exe
                blindspot-tray.exe
                blindspot-darwin-amd64
                blindspot-darwin-arm64